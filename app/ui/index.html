<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Jar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="jarContainer">
        <div class="uiPanelShell">
            <button id="closeButton" type="button" aria-label="Close"></button>

            <!-- MESSAGE POPUP -->
            <div id="messagePopup" class="hidden">
                <p id="messageText"></p>
            </div>

            <!-- =========================
                 JAR PICKER
            ========================= -->
            <div id="jarPickerPanel" class="hidden">
                <div class="panelContent">
                    <h2 class="panelTitle">Choose a Jar</h2>

                    <div id="jarPickerList"></div>

                    <div class="panelActions">
                        <button id="createJarButton" type="button">Create New Jar</button>
                    </div>
                </div>
            </div>

            <!-- =========================
                 JAR SCREEN
            ========================= -->
            <div id="jarPanel" class="hidden">
                <div class="panelContent jarScreenContent">

                    <!-- TOP ROW -->
                    <div class="panelActions topBackRow">
                        <button id="jarExploreJarsButton" type="button">Explore Other Jars</button>
                        <button id="completedIdeasButton" type="button">Completed Ideas</button>
                    </div>

                    <h2 id="jarPanelTitle" class="panelTitle">Jar</h2>
                    <div id="jarMessage"></div>

                    <img id="pickButton" src="Sprites/jar.png" alt="Idea Jar" draggable="false">

                    <div class="panelActions">
                        <button id="createIdeaButton" type="button">Create Idea</button>
                    </div>
                </div>
            </div>

            <!-- =========================
                 TASK SCREEN
            ========================= -->
            <div id="taskPanel" class="hidden">
                <div class="panelContent">
                    <div class="tabs">
                        <button id="createIdeaTopButton" class="tabButton" type="button">Create Idea</button>
                        <button id="exploreJarsButton" class="tabButton" type="button">Explore Other Jars</button>
                    </div>

                    <h2 id="taskPanelTitle" class="panelTitle"></h2>

                    <div id="taskList"></div>

                    <div class="panelActions">
                        <button id="randomTaskButton" type="button">Random Task</button>
                        <button id="createTaskButton" type="button">Create Task</button>
                    </div>
                </div>
            </div>

            <!-- =========================
                 SUBTASK SCREEN
            ========================= -->
            <div id="subtaskPanel" class="hidden">
                <div class="panelContent">

                    <div class="panelActions topBackRow">
                        <button id="subtasksBackButton" type="button">← Back</button>
                    </div>

                    <h2 id="subtaskPanelTitle" class="panelTitle"></h2>

                    <div id="subtaskList"></div>

                    <div class="panelActions">
                        <button id="randomSubtaskButton" type="button">Random Subtask</button>
                        <button id="createSubtaskButton" type="button">Create Subtask</button>
                    </div>
                </div>
            </div>

            <!-- =========================
                 COMPLETED (CURRENT JAR)
            ========================= -->
            <div id="completedJarPanel" class="hidden">
                <div class="panelContent">

                    <div class="panelActions topBackRow">
                        <button id="completedJarBackButton" type="button">← Back</button>
                    </div>

                    <h2 id="completedJarTitle" class="panelTitle">Completed</h2>

                    <div id="completedJarCount"></div>
                    <div id="completedJarList"></div>
                </div>
            </div>

            <!-- =========================
                 COMPLETED (ALL JARS)
            ========================= -->
            <div id="completedAllPanel" class="hidden">
                <div class="panelContent">

                    <div class="panelActions topBackRow">
                        <button id="completedAllBackButton" type="button">← Back</button>
                    </div>

                    <h2 class="panelTitle">Completed Ideas</h2>

                    <div id="completedAllCount"></div>
                    <div id="completedAllList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
