<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Jar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="closeButton" type="button" aria-label="Close"></button>

    <div class="jarContainer">
        <img id="pickButton" src="Sprites/jar.png" alt="Idea Jar" draggable="false">

        <button id="createIdeaButton" type="button">Create Idea</button>

        <div id="taskPanel" class="hidden">
            <div class="panelContent">
                <div class="tabs">
                    <button id="tasksTab" class="tabButton activeTab" type="button">Tasks</button>
                    <button id="completedTab" class="tabButton" type="button">Completed</button>
                </div>

                <h2 id="taskPanelTitle"></h2>
                <div id="taskList"></div>

                <div class="panelActions">
                    <button id="randomTaskButton" type="button">Random Task</button>
                    <button id="createTaskButton" type="button">Create Task</button>
                </div>
            </div>
        </div>

        <div id="subtaskPanel" class="hidden">
            <div class="panelContent">
                <div class="tabs">
                    <button id="subtasksTasksTab" class="tabButton activeTab" type="button">Tasks</button>
                    <button id="subtasksCompletedTab" class="tabButton" type="button">Completed</button>
                </div>

                <button id="backButton" type="button">← Back</button>

                <h2 id="subtaskPanelTitle"></h2>
                <div id="subtaskList"></div>

                <div class="panelActions">
                    <button id="randomSubtaskButton" type="button">Random Subtask</button>
                </div>
            </div>
        </div>

        <div id="completedPanel" class="hidden">
            <div class="panelContent">
                <div class="tabs">
                    <button id="completedTasksTab" class="tabButton" type="button">Tasks</button>
                    <button id="completedTabHeader" class="tabButton activeTab" type="button">Completed</button>
                </div>

                <button id="completedBackButton" type="button">← Back</button>

                <h2 id="completedPanelTitle">Completed</h2>
                <div id="completedCount"></div>
                <div id="completedList"></div>
            </div>
        </div>

        <div id="messagePopup" class="hidden">
            <p id="messageText"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
